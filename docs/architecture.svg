<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 620" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b45309"/>
    </marker>
  </defs>

  <rect width="980" height="620" fill="#ffffff"/>
  <text x="490" y="36" text-anchor="middle" font-size="21" font-weight="700" fill="#0f172a">flightrec-slack: a privileged-action agent with a tamper-evident black box</text>
  <text x="490" y="58" text-anchor="middle" font-size="13" fill="#64748b">The model proposes. The deterministic gate disposes. The black box remembers everything.</text>

  <!-- Slack column -->
  <rect x="30" y="90" width="230" height="440" rx="12" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="145" y="116" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">SLACK</text>

  <rect x="50" y="134" width="190" height="86" rx="8" fill="#ffffff" stroke="#94a3b8"/>
  <text x="145" y="158" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">/grant modal</text>
  <text x="145" y="176" text-anchor="middle" font-size="11" fill="#475569">structured fields only:</text>
  <text x="145" y="191" text-anchor="middle" font-size="11" fill="#475569">user, resource, scope, duration</text>
  <text x="145" y="208" text-anchor="middle" font-size="10" font-weight="600" fill="#b91c1c">free text is never an instruction</text>

  <rect x="50" y="356" width="190" height="70" rx="8" fill="#ffffff" stroke="#94a3b8"/>
  <text x="145" y="380" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">decision card</text>
  <text x="145" y="398" text-anchor="middle" font-size="11" fill="#475569">grant / deny + LLM lean</text>
  <text x="145" y="413" text-anchor="middle" font-size="11" fill="#475569">+ integrity attestation</text>

  <rect x="50" y="444" width="190" height="70" rx="8" fill="#ffffff" stroke="#94a3b8"/>
  <text x="145" y="468" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">/audit card</text>
  <text x="145" y="486" text-anchor="middle" font-size="11" fill="#166534">AUDIT VERIFIED, or</text>
  <text x="145" y="501" text-anchor="middle" font-size="11" fill="#b91c1c">INTEGRITY VIOLATION @ seq N</text>

  <!-- Broker column -->
  <rect x="320" y="90" width="290" height="440" rx="12" fill="#f0f9ff" stroke="#7dd3fc"/>
  <text x="465" y="116" text-anchor="middle" font-size="14" font-weight="700" fill="#0c4a6e">BOLT BROKER APP</text>

  <rect x="345" y="134" width="240" height="76" rx="8" fill="#ffffff" stroke="#7dd3fc"/>
  <text x="465" y="158" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Claude reasoner</text>
  <text x="465" y="176" text-anchor="middle" font-size="11" font-weight="700" fill="#0369a1">ADVISORY ONLY</text>
  <text x="465" y="192" text-anchor="middle" font-size="11" fill="#475569">rationale + lean, recorded, never executes</text>

  <rect x="345" y="232" width="240" height="90" rx="8" fill="#fefce8" stroke="#eab308"/>
  <text x="465" y="256" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">entitlement gate</text>
  <text x="465" y="274" text-anchor="middle" font-size="11" font-weight="700" fill="#a16207">AUTHORITATIVE, DETERMINISTIC</text>
  <text x="465" y="291" text-anchor="middle" font-size="11" fill="#475569">this requester + this resource +</text>
  <text x="465" y="306" text-anchor="middle" font-size="11" fill="#475569">this scope + this duration</text>

  <rect x="345" y="344" width="240" height="62" rx="8" fill="#ffffff" stroke="#7dd3fc"/>
  <text x="465" y="368" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">access system</text>
  <text x="465" y="386" text-anchor="middle" font-size="11" fill="#475569">executes only on gate ALLOW</text>

  <rect x="345" y="428" width="240" height="86" rx="8" fill="#ffffff" stroke="#7dd3fc"/>
  <text x="465" y="450" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">recorder</text>
  <text x="465" y="468" text-anchor="middle" font-size="11" fill="#475569">run_meta - llm_call - decision</text>
  <text x="465" y="483" text-anchor="middle" font-size="11" fill="#475569">tool_call (pre/post) - cost</text>
  <text x="465" y="500" text-anchor="middle" font-size="10" fill="#64748b">one Slack request = one run</text>

  <!-- Black box column -->
  <rect x="670" y="90" width="280" height="250" rx="12" fill="#0f172a"/>
  <text x="810" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="#f8fafc">FLIGHTREC BLACK BOX</text>
  <text x="810" y="146" text-anchor="middle" font-size="12" fill="#cbd5e1">append-only SQLite</text>
  <text x="810" y="166" text-anchor="middle" font-size="12" fill="#cbd5e1">SHA-256 hash chain per run</text>
  <text x="810" y="186" text-anchor="middle" font-size="12" fill="#cbd5e1">verify recomputes, never trusts</text>
  <text x="810" y="204" text-anchor="middle" font-size="12" fill="#cbd5e1">the stored head</text>
  <text x="810" y="230" text-anchor="middle" font-size="12" fill="#93c5fd">WAL: many processes,</text>
  <text x="810" y="248" text-anchor="middle" font-size="12" fill="#93c5fd">one shared audit DB</text>
  <rect x="700" y="270" width="220" height="46" rx="8" fill="#1e293b" stroke="#475569"/>
  <text x="810" y="290" text-anchor="middle" font-size="11" fill="#fca5a5">any out-of-band edit breaks the</text>
  <text x="810" y="306" text-anchor="middle" font-size="11" fill="#fca5a5">chain at the exact altered event</text>

  <!-- MCP column -->
  <rect x="670" y="370" width="280" height="160" rx="12" fill="#fff7ed" stroke="#fdba74"/>
  <text x="810" y="396" text-anchor="middle" font-size="14" font-weight="700" fill="#9a3412">FLIGHTREC-MCP SERVER</text>
  <text x="810" y="418" text-anchor="middle" font-size="11" fill="#7c2d12">record - verify - audit - list_runs</text>
  <rect x="695" y="434" width="230" height="76" rx="8" fill="#ffffff" stroke="#fdba74"/>
  <text x="810" y="456" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">Claude Desktop / Cursor /</text>
  <text x="810" y="472" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">any MCP client</text>
  <text x="810" y="492" text-anchor="middle" font-size="11" fill="#9a3412">a second agent, the same black box</text>

  <!-- Flow arrows -->
  <line x1="240" y1="172" x2="345" y2="172" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="292" y="162" text-anchor="middle" font-size="10" fill="#64748b">submit</text>

  <line x1="465" y1="210" x2="465" y2="232" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="465" y1="322" x2="465" y2="344" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="465" y1="406" x2="465" y2="428" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <line x1="585" y1="471" x2="670" y2="305" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="648" y="400" text-anchor="middle" font-size="10" fill="#64748b">append</text>

  <line x1="670" y1="180" x2="610" y2="180" stroke="#475569" stroke-width="1.6" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
  <text x="640" y="170" text-anchor="middle" font-size="10" fill="#64748b">verify + audit</text>

  <line x1="320" y1="391" x2="240" y2="391" stroke="#475569" stroke-width="1.6" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
  <line x1="320" y1="479" x2="240" y2="479" stroke="#475569" stroke-width="1.6" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
  <text x="280" y="440" text-anchor="middle" font-size="10" fill="#64748b">response_url</text>

  <line x1="810" y1="434" x2="810" y2="426" stroke="#b45309" stroke-width="2" marker-end="url(#arrowAmber)"/>
  <line x1="810" y1="370" x2="810" y2="340" stroke="#b45309" stroke-width="2" marker-end="url(#arrowAmber)"/>

  <text x="490" y="580" text-anchor="middle" font-size="12" fill="#64748b">Every step of every run is hash-chained. The audit is the accountability control; the gate is the prevention control.</text>
</svg>
